<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/base.css">
    <link rel="stylesheet" href="./src/css/app.css">
    <title>Flimo App</title>
</head>
<body>
    <main class="app">
        <section class="collections-panel">
            <div class="collections-header">
                <!-- <img src="./assets/images/app-logo.png" alt="Flimo Logo" class="collections-logo"> -->

                <h2 class="collections-title">Collections</h2>
                <p class="collections-subtitle">
                    Select a topic to start practicing.
                </p>
            </div>

            <div class="collections-list is-empty">
                <div class="empty-state">
                    <h3 class="empty-title">No collections yet</h3>
                    <p class="empty-subtitle">Create your first collection to start practicing</p>
                </div>
            </div>

            <button class="add-collection-btn" type="button">
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24">
                    <path d="M5 12h14"/>
                    <path d="M12 5v14"/>
                </svg>
            </button>
        </section>

        <section class="practice-panel"></section>
    </main>
</body>
</html>
