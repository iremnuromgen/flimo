<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/css/base.css">
    <link rel="stylesheet" href="./src/css/landing.css">
    <title>Flimo</title>
</head>
<body>
    <header class="header">
        <img src="./assets/images/flimo-logo.svg" alt="Flimo Logo" class="logo">
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1 class="hero-title">
                    Flip. Learn. Improve.<br>
                    Memorize. Own.
                </h1>

                <p class="hero-subtitle">
                    Create your own word collections and memorize vocabulary at your<br> own pace.
                    Flip the cards, mark what you know, and focus on the words<br> that need more practice.
                </p>

                <button class="hero-btn" type="button">
                    <span>Let's Start</span>
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        viewBox="0 0 24 24">
                        <path d="m9 18 6-6-6-6"/>
                    </svg>
                </button>
            </div>
            <div class="hero-visual">
                <img src="./assets/images/hero-visual.png" alt="Flimo flashcard illustration">
            </div>
        </section>
        <section class="how"></section>
    </main>
</body>
</html>
